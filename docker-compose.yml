services:
  # MySQL Database Service
  db:
    image: mysql:8.4
    platform: linux/amd64
    container_name: isids26-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: isids26
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # phpMyAdmin - Web Interface for MySQL
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: isids26-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - app-network

  # NestJS Backend Service
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: production
    container_name: isids26-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database Configuration
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_NAME: isids26
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      # Node Environment
      NODE_ENV: production
      PORT: 3000
    volumes:
      - uploads:/app/uploads
    user: "1001:1001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/books/all", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

  # Vue.js Frontend Service (Development Mode)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: isids26-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - app-network
    command: npm run dev -- --host 0.0.0.0

# Named volumes for data persistence
volumes:
  mysql_data:
    driver: local
  uploads:
    driver: local

# Network for service communication
networks:
  app-network:
    driver: bridge
